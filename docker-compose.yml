version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/template.pptx:/app/template.pptx:ro
      - ./backend/products_catalog.csv:/app/products_catalog.csv
    environment:
      - TEMPLATE_PATH=/app/template.pptx
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
