version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./template.pptx:/app/template.pptx:ro
      - ./products_catalog.csv:/app/products_catalog.csv:ro
      - ./.env:/app/.env:ro
      - ./google-credentials.json:/app/google-credentials.json:ro
    environment:
      - TEMPLATE_PATH=/app/template.pptx
      - PRODUCTS_CSV=/app/products_catalog.csv
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID:-}
      - GOOGLE_CREDENTIALS_JSON=/app/google-credentials.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
